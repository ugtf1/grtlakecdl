name: CI/CD to Cloud Run (grtlakecdl)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: top-cedar-471512-k3
  PROJECT_NUMBER: 30228073381
  REGION: us-east1
  SERVICE_NAME: grtlakecdl

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/ugtf-github-pool/providers/github-actions
          service_account: github-runner-ugtf@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo "Building image: $IMAGE_TAG"
          docker build --build-arg VITE_API_BASE="https://cdlbackend-lagfzewagq-ue.a.run.app/api" -t "$IMAGE_TAG" .
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
          docker push "$IMAGE_TAG"
          echo "image=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ steps.build.outputs.image }}
          flags: --no-invoker-iam-check --ingress=all
          wait: true

  health-check:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify Cloud Run deployment health
        env:
          SERVICE_URL: ${{ needs.build-and-deploy.outputs.service_url }}
        run: |
          echo "Checking service health at $SERVICE_URL..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Waiting for service... (status $STATUS)"
            sleep 5
          done
          echo "Service did not become healthy in time."
          exit 1

  lighthouse-audit:
    needs: [build-and-deploy, health-check]
    runs-on: ubuntu-latest
    outputs:
      lighthouse_summary: ${{ steps.summary.outputs.lighthouse_summary }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse audit
        env:
          SERVICE_URL: ${{ needs.build-and-deploy.outputs.service_url }}
        run: |
          rm -rf .lighthouseci
          mkdir -p .lighthouseci

          ROUTES=(
            "/"
            "/about"
            "/contact"
            "/application-form"
            "/admin-login"
          )

          slug_for_route() {
            local route="$1"
            if [ "$route" = "/" ]; then
              echo "home"
            else
              echo "${route#/}" | tr '/' '-'
            fi
          }

          collect_report() {
            local mode="$1"
            local route="$2"
            local slug
            local url
            local report

            slug=$(slug_for_route "$route")
            url="${SERVICE_URL%/}${route}"

            rm -f .lighthouseci/lhr-*.json .lighthouseci/manifest.json
            echo "Running Lighthouse ($mode) for $url..."

            if [ "$mode" = "desktop" ]; then
              lhci collect \
                --url="$url" \
                --numberOfRuns=1 \
                --settings.formFactor=desktop \
                --settings.screenEmulation.mobile=false \
                --settings.throttlingMethod=provided
            else
              lhci collect \
                --url="$url" \
                --numberOfRuns=1 \
                --settings.formFactor=mobile \
                --settings.screenEmulation.mobile=true \
                --settings.throttlingMethod=simulate
            fi

            report=$(find .lighthouseci -name "lhr-*.json" -type f | sort | tail -n 1)
            if [ -z "$report" ]; then
              echo "$mode Lighthouse report was not generated for $route."
              exit 1
            fi
            cp "$report" ".lighthouseci/lighthouse-${mode}-${slug}.json"
          }

          for route in "${ROUTES[@]}"; do
            collect_report "desktop" "$route"
            collect_report "mobile" "$route"
          done

      - name: Extract Lighthouse scores
        id: summary
        run: |
          SUMMARY=$(python3 - <<'EOF'
          import glob
          import json
          import os
          import statistics

          categories = [
              ("performance", "Perf"),
              ("accessibility", "Access"),
              ("best-practices", "Best"),
              ("seo", "SEO"),
          ]

          route_names = {
              "home": "/",
              "about": "/about",
              "contact": "/contact",
              "application-form": "/application-form",
              "admin-login": "/admin-login",
          }

          rows = []
          for path in sorted(glob.glob(".lighthouseci/lighthouse-*.json")):
              name = os.path.basename(path).removeprefix("lighthouse-").removesuffix(".json")
              mode, slug = name.split("-", 1)
              with open(path, "r", encoding="utf-8") as f:
                  data = json.load(f)
              scores = {
                  key: round(data["categories"][key]["score"] * 100)
                  for key, _ in categories
              }
              rows.append(
                  {
                      "mode": mode.capitalize(),
                      "route": route_names.get(slug, f"/{slug}"),
                      "requested_url": data.get("requestedUrl", ""),
                      "final_url": data.get("finalDisplayedUrl", ""),
                      **scores,
                  }
              )

          if not rows:
              raise SystemExit("No Lighthouse reports found.")

          mode_order = {"Desktop": 0, "Mobile": 1}
          route_order = {route: index for index, route in enumerate(route_names.values())}
          rows.sort(key=lambda row: (mode_order[row["mode"]], route_order.get(row["route"], 99)))

          aggregates = []
          for mode in ("Desktop", "Mobile"):
              mode_rows = [row for row in rows if row["mode"] == mode]
              if not mode_rows:
                  continue
              aggregates.append(
                  {
                      "mode": mode,
                      **{
                          key: round(statistics.mean(row[key] for row in mode_rows))
                          for key, _ in categories
                      },
                  }
              )

          def table(headers, body_rows):
              widths = [
                  max(len(str(row[index])) for row in [headers, *body_rows])
                  for index in range(len(headers))
              ]
              header = " | ".join(str(value).ljust(widths[index]) for index, value in enumerate(headers))
              divider = "-+-".join("-" * width for width in widths)
              body = [
                  " | ".join(str(value).ljust(widths[index]) for index, value in enumerate(row))
                  for row in body_rows
              ]
              return "\n".join([header, divider, *body])

          headers = ["Mode", "Perf", "Access", "Best", "SEO"]
          aggregate_rows = [
              [
                  f"**{row['mode']}**",
                  f"**{row['performance']}**",
                  f"**{row['accessibility']}**",
                  f"**{row['best-practices']}**",
                  f"**{row['seo']}**",
              ]
              for row in aggregates
          ]
          page_rows = [
              [
                  row["route"],
                  row["mode"],
                  row["performance"],
                  row["accessibility"],
                  row["best-practices"],
                  row["seo"],
              ]
              for row in rows
          ]

          audited_routes = ", ".join(route_names.values())
          requested_urls = sorted({row["requested_url"] for row in rows if row["requested_url"]})

          print("Scores are whole-number Lighthouse scores from 0-100.")
          print(f"Audited routes: {audited_routes}")
          print("Skipped protected route: /admin")
          print(f"Base deployment URL: {requested_urls[0].rsplit('/', 1)[0] if requested_urls else 'unknown'}")
          print()
          print("AGGREGATED SCORES - average across audited pages")
          print(table(headers, aggregate_rows))
          print()
          print("INDIVIDUAL PAGE SCORES")
          print(table(["Page", "Mode", "Perf", "Access", "Best", "SEO"], page_rows))
          EOF
          )

          {
            echo "lighthouse_summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  seo-audit:
    needs: [build-and-deploy, lighthouse-audit]
    runs-on: ubuntu-latest
    outputs:
      issues_summary: ${{ steps.summary.outputs.issues_summary }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run SEO audit
        env:
          SERVICE_URL: ${{ needs.build-and-deploy.outputs.service_url }}
        run: |
          python - <<'EOF'
          import json
          import os
          from urllib.parse import urljoin

          import requests
          from bs4 import BeautifulSoup

          url = os.environ["SERVICE_URL"]
          print(f"Auditing {url} for SEO issues...")
          resp = requests.get(url, timeout=10)
          resp.raise_for_status()
          soup = BeautifulSoup(resp.text, "lxml")

          issues = []
          if not soup.title or not soup.title.string or not soup.title.string.strip():
              issues.append("Missing <title>")
          if not soup.find("meta", attrs={"name": "description"}):
              issues.append("Missing meta description")
          if not soup.find("h1"):
              issues.append("Missing <h1> tag")

          broken_links = []
          for a in soup.find_all("a", href=True):
              link = urljoin(url, a["href"])
              if link.startswith(("tel:", "mailto:", "javascript:")):
                  continue
              try:
                  r = requests.head(link, allow_redirects=True, timeout=5)
                  if r.status_code >= 400:
                      broken_links.append(link)
              except Exception:
                  broken_links.append(link)

          if broken_links:
              issues.append(f"{len(broken_links)} broken links found")

          with open("seo-results.json", "w", encoding="utf-8") as f:
              json.dump(
                  {
                      "url": url,
                      "issues": issues,
                      "broken_links": broken_links,
                      "total_issues": len(issues),
                  },
                  f,
                  indent=2,
              )

          print(f"SEO audit complete: {len(issues)} issues found.")
          EOF

      - name: Generate SEO summary
        id: summary
        run: |
          SUMMARY=$(python - <<'EOF'
          import json

          with open("seo-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          issues = data.get("issues", [])
          print(", ".join(issues[:3]) if issues else "No SEO issues detected")
          EOF
          )
          echo "issues_summary=$SUMMARY" >> "$GITHUB_OUTPUT"

  notify:
    needs: [build-and-deploy, lighthouse-audit, seo-audit]
    runs-on: ubuntu-latest
    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
    steps:
      - name: Send email summary
        if: ${{ env.EMAIL_USER != '' && env.EMAIL_PASS != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.EMAIL_USER }}
          password: ${{ env.EMAIL_PASS }}
          subject: "grtlakecdl deployment report"
          to: ono@ugtf.org, chukseo@gmail.com
          from: UGTF CI Bot
          body: |
            Deployment completed for ${{ env.SERVICE_NAME }}

            URL: ${{ needs.build-and-deploy.outputs.service_url }}

            Lighthouse:
            ${{ needs.lighthouse-audit.outputs.lighthouse_summary }}

            SEO:
            ${{ needs.seo-audit.outputs.issues_summary }}
