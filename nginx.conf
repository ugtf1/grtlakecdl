server {
  listen 8080;
  listen [::]:8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve SPA routes correctly
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Cache hashed static assets for 1 year
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Cache other static file types (images, fonts, etc.)
  location ~* \.(?:ico|css|js|webp|jpe?g|png|woff2?|svg|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    gzip off; # don't gzip binary images
  }

  # Health check endpoint
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }
}
