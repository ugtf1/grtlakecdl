server {
    listen 8080;
    listen [::]:8080;
    server_name gl-cdl.com;

    # React build output
    root /path/to/your/react/build;
    index index.html;

    # Serve React frontend
    location / {
        try_files $uri /index.html;
    }

    # Proxy API calls to Cloud Run backend
    location /api/ {
        proxy_pass https://cdlbackend-lagfzewagq-ue.a.run.app/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
